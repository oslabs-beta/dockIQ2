services:
  backend:
    image: dockiq-backend
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      PROMETHEUS_URL: http://prometheus:9090
      GRAFANA_URL: http://grafana:3100

  frontend:
    image: dockiq-frontend
    ports:
      - '3101:3000'
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3000

  prometheus:
    image: prom/prometheus
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana
    ports:
      - '3100:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

  node_exporter:
    image: prom/node-exporter
    ports:
      - '9100:9100'
